name: Build and Push Minetest Image to ECR

on:
  push:
    branches: [ "main" ]
    paths:
      - 'docker/**' # 只有当 docker 文件夹下的内容变动时才触发镜像构建

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: sl-minetest-server

jobs:
  deploy:
    name: Build and Push
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }} # 使用 Git Commit SHA 作为标签，实现版本可追溯
      run: |
        # 构建镜像
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./docker
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest ./docker
        
        # 推送镜像 (推送特定 SHA 版本和 latest 版本)
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest